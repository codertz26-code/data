<!DOCTYPE html>
<html>
<head>
    <title>Data Collector Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Data Collector Dashboard</h1>
        
        <div class="stats">
            <div class="card">
                <h3>Jumla ya Data</h3>
                <p id="totalData">0 MB</p>
            </div>
            <div class="card">
                <h3>Mtandao wa Sasa</h3>
                <p id="currentNetwork">Hakuna</p>
            </div>
            <div class="card">
                <h3>Data za Leo</h3>
                <p id="todayData">0 MB</p>
            </div>
        </div>
        
        <div class="table-container">
            <h2>Historia ya Data</h2>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Muda</th>
                        <th>Mtandao</th>
                        <th>Data (MB)</th>
                        <th>Signal</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data itaingizwa hapa na JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
